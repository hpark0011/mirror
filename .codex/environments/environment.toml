# Codex cloud environment config for the mirror monorepo.
# Local-worktree setup uses `.agents/skills/new-worktree/scripts/new-worktree.sh`
# (per-worktree Convex deployment, env sync, etc.). Codex cloud envs are
# fresh clones with no sibling main checkout, so they only need deps installed.
version = 1
name = "mirror"

[setup]
script = "pnpm install --frozen-lockfile --prefer-offline --reporter=append-only"

[[actions]]
name = "Run Mirror"
icon = "run"
command = "pnpm dev --filter=@feel-good/mirror"

[[actions]]
name = "Run Convex"
icon = "run"
command = "pnpm --filter=@feel-good/convex dev"

[[actions]]
name = "Run E2E"
icon = "run"
command = "pnpm --filter=@feel-good/mirror test:e2e"
